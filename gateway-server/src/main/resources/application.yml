spring:
  application:
    name: gateway-server
  main:
    allow-bean-definition-overriding:
      true
  datasource:
    url: jdbc:postgresql://localhost:5432/shortlinkuser
    password: 12345
    username: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  cloud:
    gateway:
      routes:
#        - id: "user-server"
#          uri: "http://localhost:8082"
#          predicates:
#            - Path=/user/**
#
#        - id: "url-server"
#          uri: "http://localhost:8083"
#          predicates:
#            - Path=/url/**

    discovery:
      locator:
        enable:
          true
        lower-case-service-id: true

server:
  port: 8081
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8080/eureka/
